spring:
  application:
    name: point-of-sale
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/point-of-sale}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQL57Dialect
    hibernate:
      ddl-auto: update
    open-in-view: false
logging:
  level:
    org:
      hibernate:
        SQL: debug

server:
  port: ${PORT:8082}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
